version: "3.9"
services:
  postgres-knowledge:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: flexxusorder_knowledge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Flexxus2023**
    ports:
      - "5433:5432"        
    networks:
      - traefik  
    volumes:
      - openspec-pgdata:/var/lib/postgresql/data
    deploy:
      placement:
        constraints: ["${NODE}"]      
    restart: unless-stopped
    logging:
      driver: loki
      options:
        loki-url: ${LOKI_URL}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flexxusorder_knowledge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  openspec-pgdata:
    driver: local
    name: "${SERVICE_NAME}_flexxus-order-openspec-pgdata"

networks:
  networks:
  traefik:
    external:
      name: traefik-network
