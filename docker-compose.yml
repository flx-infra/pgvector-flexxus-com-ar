version: "3.9"
services:
  postgres-knowledge:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "5433:5432"
    networks:
      - traefik
    volumes:
      - openspec-pgdata:/var/lib/postgresql/data
    deploy:
      placement:
        constraints: ["${NODE}"]
      restart_policy:
        condition: any
    logging:
      driver: loki
      options:
        loki-url: ${LOKI_URL}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flexxusorder_knowledge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  openspec-pgdata:
    driver: local
    name: "${SERVICE_NAME}_flexxus-order-openspec-pgdata"

networks:
  traefik:
    external: true
    name: traefik-network
